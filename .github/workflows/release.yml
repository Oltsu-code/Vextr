name: Release (Full)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Debug
          - os: ubuntu-latest
            build_type: Release
          - os: windows-latest
            build_type: Debug
          - os: windows-latest
            build_type: Release
          - os: macos-latest
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: 3.28.x

      - name: Setup Linux compiler
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++ gcc

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build -j 4

      - name: Test
        run: ctest --test-dir build --output-on-failure

  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: 3.28.x

      - name: Setup Linux compiler
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++ gcc

      - name: Configure install
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=dist

      - name: Build + install
        run: |
          cmake --build build -j 4
          cmake --install build

      - name: Archive
        run: |
          tar -czf vextr-${{ runner.os }}.tar.gz dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vextr-${{ runner.os }}
          path: vextr-${{ runner.os }}.tar.gz
          retention-days: 30